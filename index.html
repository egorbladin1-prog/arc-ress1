<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESS RUSSIA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="logo.jpg" alt="Logo" class="logo-img">
        </div>
        <button class="burger-menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <main>
        <section class="hero">
            <div class="hero-bg"></div>
            <div class="container">
                <h1 class="hero-title">ДОБРО ПОЖАЛОВАТЬ НА<br><span class="highlight-red">RESS RUSSIA</span></h1>
                <p class="hero-subtitle">Отправляйся в мир безграничных возможностей, мы даём возможность тебе стать кем угодно здесь и сразу!</p>
                
                <div class="btn-container">
                    <a href="base.apk" download class="btn btn-primary btn-glow">НАЧАТЬ ИГРАТЬ</a>
                </div>

                <div class="scroll-down" id="scroll-btn">
                    <p>Листай дальше, чтобы узнать больше</p>
                    <div class="arrows">
                        <div class="arrow"></div>
                        <div class="arrow"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="factions">
            <div class="container">
                <h2 class="section-title">ВЫБЕРИ СВОЮ<br>СТОРОНУ</h2>
                <div class="factions-grid">
                    <div class="faction-card cop">
                        <div class="faction-bg" style="background-image: url('https://placehold.co/400x600/001a33/fff?text=COP');"></div>
                        <div class="faction-badge badge-blue">ЖИЗНЬ ПО ЗАКОНУ</div>
                    </div>
                    <div class="faction-card bandit">
                        <div class="faction-bg" style="background-image: url('https://placehold.co/400x600/330000/fff?text=BANDIT');"></div>
                        <div class="faction-badge badge-red">БАНДИТСКАЯ ЖИЗНЬ</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="gameplay">
            <div class="container">
                <p class="gameplay-desc">Все необходимые компоненты<br>игры.</p>
                <div class="screenshots">
                    <img src="https://placehold.co/600x300/222/555?text=Screenshot+1" alt="Screen 1" class="screen-img">
                    <img src="https://placehold.co/600x300/222/555?text=Screenshot+2" alt="Screen 2" class="screen-img">
                    <img src="https://placehold.co/600x300/222/555?text=Screenshot+3" alt="Screen 3" class="screen-img">
                </div>
            </div>
        </section>

        <section id="download" class="download">
            <div class="container">
                <div class="btn-container bottom-btn-container">
                    <a href="base.apk" download class="btn btn-huge btn-glow-huge">СКАЧАТЬ С САЙТА</a>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
